syntax = "proto3";
package proto;
option go_package = "./proto";

// SupervisorService defines RPCs that the Worker calls on the Supervisor
// Supervisor -> receives these calls from Worker
service SupervisorService {
    // RegisterWorker registers a new worker with the supervisor
    rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);

    // Heartbeat sends periodic health updates from worker to supervisor
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message RegisterWorkerRequest {
    string workerId = 1;
    string hostName = 2;
    int32 port = 3;
}

message RegisterWorkerResponse {
    bool success = 1;
    string message = 2;
}

message HeartbeatRequest {
    string workerId = 1;
    int32 activeJobs = 2;
    int32 capacity = 3;
}

message HeartbeatResponse {
    bool acknowledged = 1;
}
